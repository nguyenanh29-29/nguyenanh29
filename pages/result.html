<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả - EAnh</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>🎓 EAnh</h2></div>
            <nav class="sidebar-nav">
                <a href="../dashboard.html" class="nav-item"><span class="icon">📊</span> Dashboard</a>
                <a href="vocabulary.html" class="nav-item"><span class="icon">📚</span> Từ vựng</a>
                <a href="grammar.html" class="nav-item"><span class="icon">✏️</span> Ngữ pháp</a>
                <a href="listening.html" class="nav-item"><span class="icon">🎧</span> Luyện nghe</a>
                <a href="reading.html" class="nav-item"><span class="icon">📖</span> Luyện đọc</a>
                <a href="writing.html" class="nav-item"><span class="icon">✍️</span> Luyện viết</a>
                <a href="speaking.html" class="nav-item"><span class="icon">🎤</span> Luyện nói</a>
                <a href="mock-test.html" class="nav-item"><span class="icon">📝</span> Thi thử</a>
                <a href="result.html" class="nav-item active"><span class="icon">📈</span> Kết quả</a>
            </nav>
            <div class="sidebar-footer">
                <a href="profile.html" class="nav-item"><span class="icon">👤</span> Hồ sơ</a>
                <a href="#" id="logoutBtn" class="nav-item"><span class="icon">🚪</span> Đăng xuất</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>📈 Kết quả & Thống kê</h1>
            </header>

            <div class="stats-grid" style="margin-bottom: 2rem;">
                <div class="stat-card">
                    <div class="stat-icon">📝</div>
                    <div class="stat-info">
                        <h3 id="totalTests">0</h3>
                        <p>Bài thi đã làm</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🎯</div>
                    <div class="stat-info">
                        <h3 id="avgScore">0%</h3>
                        <p>Điểm trung bình</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📚</div>
                    <div class="stat-info">
                        <h3 id="totalWords">0</h3>
                        <p>Từ đã học</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-info">
                        <h3 id="studyHours">0h</h3>
                        <p>Thời gian học</p>
                    </div>
                </div>
            </div>

            <div style="background: linear-gradient(135deg, var(--dark-light), var(--dark-lighter)); padding: 2rem; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 2rem;">
                <h2 style="margin-bottom: 1.5rem;">📊 Biểu đồ tiến độ</h2>
                <div id="progressChart" style="height: 300px; display: flex; align-items: flex-end; gap: 1rem; padding: 1rem;">
                    <!-- Simple bar chart -->
                </div>
            </div>

            <div style="background: linear-gradient(135deg, var(--dark-light), var(--dark-lighter)); padding: 2rem; border-radius: 15px; border: 1px solid var(--border);">
                <h2 style="margin-bottom: 1.5rem;">📝 Lịch sử thi</h2>
                <div id="testHistory"></div>
            </div>
        </main>
    </div>

    <style>
        .history-item {
            background: var(--dark);
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: center;
        }
        .history-title {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .history-meta {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        .history-score {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 0.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .chart-bar:hover {
            opacity: 0.8;
        }
    </style>

    <script src="../assets/js/main.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user.id) window.location.href = '../login.html';
        
        document.getElementById('logoutBtn').onclick = (e) => {
            e.preventDefault();
            if (confirm('Đăng xuất?')) { localStorage.clear(); window.location.href = '../login.html'; }
        };

        async function loadResults() {
            try {
                const res = await fetch(`../backend/api/result.php?action=stats&userId=${user.id}`);
                const data = await res.json();
                if (data.success) {
                    updateStats(data.stats);
                }

                const historyRes = await fetch(`../backend/api/result.php?action=testResults&userId=${user.id}`);
                const historyData = await historyRes.json();
                if (historyData.success) {
                    displayHistory(historyData.results);
                    renderChart(historyData.results);
                }
            } catch (error) {
                console.error(error);
                showToast('Lỗi tải dữ liệu', 'error');
            }
        }

        function updateStats(stats) {
            document.getElementById('totalTests').textContent = stats.completedTests || 0;
            document.getElementById('avgScore').textContent = (stats.avgScore || 0) + '%';
            document.getElementById('totalWords').textContent = stats.totalWords || 0;
            document.getElementById('studyHours').textContent = (stats.studyTime || 0) + 'h';
        }

        function displayHistory(results) {
            const container = document.getElementById('testHistory');
            if (results.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Chưa có kết quả nào</p>';
                return;
            }

            container.innerHTML = results.map(result => `
                <div class="history-item">
                    <div>
                        <div class="history-title">${result.title || 'Bài thi'}</div>
                        <div class="history-meta">
                            📅 ${formatDate(result.completed_at)} | 
                            ⏱️ ${Math.floor(result.time_spent / 60)} phút |
                            ✅ ${result.correct_answers}/${result.total_questions} câu đúng
                        </div>
                    </div>
                    <div class="history-score">${Math.round(result.score)}%</div>
                </div>
            `).join('');
        }

        function renderChart(results) {
            const container = document.getElementById('progressChart');
            if (results.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-muted); margin: auto;">Chưa có dữ liệu</p>';
                return;
            }

            const recentResults = results.slice(0, 10).reverse();
            const maxScore = 100;

            container.innerHTML = recentResults.map((result, i) => {
                const height = (result.score / maxScore) * 100;
                return `
                    <div class="chart-bar" style="height: ${height}%;" title="${result.title}: ${Math.round(result.score)}%">
                        ${Math.round(result.score)}%
                    </div>
                `;
            }).join('');
        }

        loadResults();
    </script>
</body>
</html>
