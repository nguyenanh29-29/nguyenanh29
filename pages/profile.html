    <!DOCTYPE html>
    <html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hồ sơ cá nhân - EAnh</title>
        <link rel="stylesheet" href="../assets/css/style.css">
    </head>
    <body>
        <div class="dashboard-layout">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>🎓 EAnh</h2>
                </div>
                <nav class="sidebar-nav">
                    <a href="../dashboard.html" class="nav-item">
                        <span class="icon">📊</span> Dashboard
                    </a>
                    <a href="vocabulary.html" class="nav-item">
                        <span class="icon">📚</span> Từ vựng
                    </a>
                    <a href="grammar.html" class="nav-item">
                        <span class="icon">✏️</span> Ngữ pháp
                    </a>
                    <a href="listening.html" class="nav-item">
                        <span class="icon">🎧</span> Luyện nghe
                    </a>
                    <a href="reading.html" class="nav-item">
                        <span class="icon">📖</span> Luyện đọc
                    </a>
                    <a href="writing.html" class="nav-item">
                        <span class="icon">✍️</span> Luyện viết
                    </a>
                    <a href="speaking.html" class="nav-item">
                        <span class="icon">🎤</span> Luyện nói
                    </a>
                    <a href="mock-test.html" class="nav-item">
                        <span class="icon">📝</span> Thi thử
                    </a>
                    <a href="result.html" class="nav-item">
                        <span class="icon">📈</span> Kết quả
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <a href="profile.html" class="nav-item active">
                        <span class="icon">👤</span> Hồ sơ
                    </a>
                    <a href="#" id="logoutBtn" class="nav-item">
                        <span class="icon">🚪</span> Đăng xuất
                    </a>
                </div>
            </aside>

            <main class="main-content">
                <header class="content-header">
                    <h1>👤 Hồ sơ cá nhân</h1>
                </header>

                <div class="profile-container">
                    <div class="profile-card">
                        <div class="profile-header">
                            <div class="avatar-container">
                                <img id="profileAvatar" src="https://via.placeholder.com/120" alt="Avatar" class="profile-avatar">
                                <button class="btn-change-avatar" onclick="changeAvatar()">📷</button>
                            </div>
                            <div class="profile-info">
                                <h2 id="profileName">Loading...</h2>
                                <p id="profileEmail">Loading...</p>
                                <span class="profile-level" id="profileLevel">A1</span>
                            </div>
                        </div>

                        <div class="profile-stats">
                            <div class="stat-item">
                                <div class="stat-value" id="profileWords">0</div>
                                <div class="stat-label">Từ đã học</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="profileTests">0</div>
                                <div class="stat-label">Bài đã thi</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="profileHours">0</div>
                                <div class="stat-label">Giờ học</div>
                            </div>
                        </div>
                    </div>

                    <div class="profile-form-card">
                        <h3>Thông tin cá nhân</h3>
                        <form id="updateProfileForm">
                            <div class="form-group">
                                <label>Họ và tên</label>
                                <input type="text" id="fullname" name="fullname" required>
                            </div>

                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="email" name="email" disabled>
                                <small>Email không thể thay đổi</small>
                            </div>

                            <div class="form-group">
                                <label>Ngày tham gia</label>
                                <input type="text" id="joinDate" disabled>
                            </div>

                            <button type="submit" class="btn-primary">Cập nhật thông tin</button>
                        </form>
                    </div>

                    <div class="profile-form-card">
                        <h3>Đổi mật khẩu</h3>
                        <form id="changePasswordForm">
                            <div class="form-group">
                                <label>Mật khẩu hiện tại</label>
                                <input type="password" id="currentPassword" required>
                            </div>

                            <div class="form-group">
                                <label>Mật khẩu mới</label>
                                <input type="password" id="newPassword" required minlength="6">
                            </div>

                            <div class="form-group">
                                <label>Xác nhận mật khẩu mới</label>
                                <input type="password" id="confirmPassword" required>
                            </div>

                            <button type="submit" class="btn-primary">Đổi mật khẩu</button>
                        </form>
                    </div>
                </div>
            </main>
        </div>

        <style>
            .profile-container {
                display: grid;
                gap: 2rem;
            }

            .profile-card {
                background: linear-gradient(135deg, var(--dark-light), var(--dark-lighter));
                border-radius: 20px;
                padding: 2rem;
                border: 1px solid var(--border);
            }

            .profile-header {
                display: flex;
                gap: 2rem;
                align-items: center;
                margin-bottom: 2rem;
                flex-wrap: wrap;
            }

            .avatar-container {
                position: relative;
            }

            .profile-avatar {
                width: 120px;
                height: 120px;
                border-radius: 50%;
                border: 4px solid var(--primary);
            }

            .btn-change-avatar {
                position: absolute;
                bottom: 0;
                right: 0;
                background: var(--primary);
                color: white;
                border: none;
                width: 36px;
                height: 36px;
                border-radius: 50%;
                cursor: pointer;
                font-size: 1.2rem;
                transition: all 0.3s;
            }

            .btn-change-avatar:hover {
                background: var(--primary-dark);
                transform: scale(1.1);
            }

            .profile-info h2 {
                font-size: 2rem;
                margin-bottom: 0.5rem;
                background: linear-gradient(135deg, var(--primary), var(--secondary));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .profile-info p {
                color: var(--text-muted);
                margin-bottom: 0.5rem;
            }

            .profile-level {
                display: inline-block;
                padding: 0.5rem 1rem;
                background: var(--primary);
                color: white;
                border-radius: 20px;
                font-weight: 600;
            }

            .profile-stats {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 2rem;
                padding-top: 2rem;
                border-top: 1px solid var(--border);
            }

            .stat-item {
                text-align: center;
            }

            .stat-value {
                font-size: 2.5rem;
                font-weight: bold;
                background: linear-gradient(135deg, var(--primary), var(--secondary));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 0.5rem;
            }

            .stat-label {
                color: var(--text-muted);
            }

            .profile-form-card {
                background: linear-gradient(135deg, var(--dark-light), var(--dark-lighter));
                border-radius: 20px;
                padding: 2rem;
                border: 1px solid var(--border);
            }

            .profile-form-card h3 {
                margin-bottom: 1.5rem;
                color: var(--primary);
            }
        </style>

        <script src="../assets/js/main.js"></script>
        <script>
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.id) {
                window.location.href = '../login.html';
            }

            // Load profile data
            function loadProfile() {
                document.getElementById('profileName').textContent = user.fullname || 'User';
                document.getElementById('profileEmail').textContent = user.email || '';
                document.getElementById('fullname').value = user.fullname || '';
                document.getElementById('email').value = user.email || '';
                document.getElementById('joinDate').value = formatDate(user.created_at) || '';
                
                if (user.avatar) {
                    document.getElementById('profileAvatar').src = user.avatar;
                }
            }

            // Load stats
            async function loadStats() {
                try {
                    const response = await fetch(`../backend/api/result.php?action=stats&userId=${user.id}`);
                    const data = await response.json();
                    
                    if (data.success) {
                        document.getElementById('profileWords').textContent = data.stats.totalWords || 0;
                        document.getElementById('profileTests').textContent = data.stats.completedTests || 0;
                        document.getElementById('profileHours').textContent = data.stats.studyTime || 0;
                        document.getElementById('profileLevel').textContent = data.stats.level || 'A1';
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            }

            // Update profile
            document.getElementById('updateProfileForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const fullname = document.getElementById('fullname').value;
                
                const formData = new FormData();
                formData.append('userId', user.id);
                formData.append('fullname', fullname);
                formData.append('action', 'update_profile');
                
                try {
                    const response = await fetch('../backend/api/result.php', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        user.fullname = fullname;
                        localStorage.setItem('user', JSON.stringify(user));
                        showToast('Cập nhật thành công!', 'success');
                        loadProfile();
                    } else {
                        showToast(data.message, 'error');
                    }
                } catch (error) {
                    showToast('Lỗi kết nối!', 'error');
                }
            });

            // Change password
            document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (newPassword !== confirmPassword) {
                    showToast('Mật khẩu xác nhận không khớp!', 'error');
                    return;
                }
                
                if (newPassword.length < 6) {
                    showToast('Mật khẩu phải có ít nhất 6 ký tự!', 'error');
                    return;
                }
                
                showToast('Chức năng đang phát triển', 'info');
                this.reset();
            });

            // Change avatar
            function changeAvatar() {
                showToast('Chức năng đang phát triển', 'info');
            }

            // Logout
            document.getElementById('logoutBtn').addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('Bạn có chắc muốn đăng xuất?')) {
                    localStorage.clear();
                    window.location.href = '../login.html';
                }
            });

            loadProfile();
            loadStats();
        </script>
    </body>
    </html>
