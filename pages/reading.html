<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện đọc - EAnh</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>🎓 EAnh</h2></div>
            <nav class="sidebar-nav">
                <a href="../dashboard.html" class="nav-item"><span class="icon">📊</span> Dashboard</a>
                <a href="vocabulary.html" class="nav-item"><span class="icon">📚</span> Từ vựng</a>
                <a href="grammar.html" class="nav-item"><span class="icon">✏️</span> Ngữ pháp</a>
                <a href="listening.html" class="nav-item"><span class="icon">🎧</span> Luyện nghe</a>
                <a href="reading.html" class="nav-item active"><span class="icon">📖</span> Luyện đọc</a>
                <a href="writing.html" class="nav-item"><span class="icon">✍️</span> Luyện viết</a>
                <a href="speaking.html" class="nav-item"><span class="icon">🎤</span> Luyện nói</a>
                <a href="mock-test.html" class="nav-item"><span class="icon">📝</span> Thi thử</a>
                <a href="result.html" class="nav-item"><span class="icon">📈</span> Kết quả</a>
            </nav>
            <div class="sidebar-footer">
                <a href="profile.html" class="nav-item"><span class="icon">👤</span> Hồ sơ</a>
                <a href="#" id="logoutBtn" class="nav-item"><span class="icon">🚪</span> Đăng xuất</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header"><h1>📖 Luyện đọc</h1></header>

            <div class="filter-section" style="margin-bottom: 2rem;">
                <select id="levelFilter" class="filter-select">
                    <option value="">Tất cả cấp độ</option>
                    <option value="A1">A1</option><option value="A2">A2</option>
                    <option value="B1">B1</option><option value="B2">B2</option>
                    <option value="C1">C1</option><option value="C2">C2</option>
                </select>
                <select id="categoryFilter" class="filter-select">
                    <option value="">Tất cả chủ đề</option>
                    <option value="News">Tin tức</option><option value="Science">Khoa học</option>
                    <option value="Culture">Văn hóa</option><option value="Technology">Công nghệ</option>
                </select>
                <button id="searchBtn" class="btn-primary">Tìm kiếm</button>
            </div>

            <div id="readingList" class="reading-grid"></div>
        </main>
    </div>

    <div id="readingModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 1000px; max-height: 90vh; overflow-y: auto;">
            <span class="close">&times;</span>
            <div id="readingDetail"></div>
        </div>
    </div>

    <style>
        .reading-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .reading-card { background: linear-gradient(135deg, var(--dark-light), var(--dark-lighter)); padding: 2rem; border-radius: 15px; border: 1px solid var(--border); cursor: pointer; transition: all 0.3s; }
        .reading-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
        .reading-title { font-size: 1.4rem; font-weight: bold; color: var(--primary); margin-bottom: 1rem; }
        .reading-content-box { background: var(--dark); padding: 2rem; border-radius: 10px; line-height: 1.8; margin: 1.5rem 0; }
        .question-section { margin-top: 2rem; }
        .filter-select { padding: 0.75rem 1rem; background: var(--dark-light); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; flex: 1; min-width: 150px; }
        .filter-section { display: flex; gap: 1rem; flex-wrap: wrap; }
    </style>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/modal.js"></script>

    <script>
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user.id) window.location.href = '../login.html';
        
        document.getElementById('logoutBtn').onclick = (e) => {
            e.preventDefault();
            if (confirm('Đăng xuất?')) { localStorage.clear(); window.location.href = '../login.html'; }
        };

        async function loadReading() {
            try {
                const level = document.getElementById('levelFilter').value;
                const category = document.getElementById('categoryFilter').value;
                const res = await fetch(`../backend/api/reading.php?level=${level}&category=${category}`);
                const data = await res.json();
                if (data.success) displayReading(data.reading);
            } catch (error) { showToast('Lỗi tải dữ liệu', 'error'); }
        }

        function displayReading(reading) {
            const container = document.getElementById('readingList');
            if (reading.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Không có bài đọc nào</p>';
                return;
            }
            container.innerHTML = reading.map(item => `
                <div class="reading-card" onclick="showReading(${item.id})">
                    <div class="reading-title">${item.title}</div>
                    <p style="color: var(--text-muted);">${item.content.substring(0, 150)}...</p>
                    <div style="margin-top: 1rem; display: flex; gap: 1rem;">
                        <span class="vocab-level">${item.level}</span>
                        <span style="color: var(--text-muted); font-size: 0.875rem;">📄 ${item.word_count || 300} từ</span>
                    </div>
                </div>
            `).join('');
        }

        async function showReading(id) {
            try {
                const res = await fetch(`../backend/api/reading.php?id=${id}`);
                const data = await res.json();
                if (data.success) {
                    const reading = data.reading;
                    document.getElementById('readingDetail').innerHTML = `
                        <h2 style="color: var(--primary); margin-bottom: 1rem;">${reading.title}</h2>
                        <span class="vocab-level">${reading.level}</span>
                        <div class="reading-content-box">${reading.content}</div>
                        <div class="question-section">
                            <h3 style="color: var(--primary); margin-bottom: 1rem;">❓ Câu hỏi</h3>
                            <div id="questionsContainer"></div>
                            <button onclick="checkAnswers()" class="btn-primary" style="margin-top: 1rem;">Kiểm tra</button>
                        </div>
                    `;
                    document.getElementById('readingModal').style.display = 'flex';
                    loadQuestions();
                }
            } catch (error) { console.error(error); }
        }

        function loadQuestions() {
            const questions = [
                { text: 'What is the main idea?', options: ['Option A', 'Option B', 'Option C', 'Option D'], correct: 0 },
                { text: 'According to the passage...', options: ['True', 'False', 'Not given', 'Unknown'], correct: 0 }
            ];
            document.getElementById('questionsContainer').innerHTML = questions.map((q, i) => `
                <div style="background: var(--dark); padding: 1.5rem; border-radius: 10px; margin-bottom: 1rem;">
                    <div style="font-weight: 600; margin-bottom: 1rem;">${i+1}. ${q.text}</div>
                    <div style="display: grid; gap: 0.75rem;">
                        ${q.options.map((opt, j) => `
                            <div class="answer-option" data-q="${i}" data-a="${j}" onclick="selectAnswer(${i},${j})" style="padding: 1rem; background: var(--dark-light); border: 2px solid var(--border); border-radius: 8px; cursor: pointer;">${opt}</div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function selectAnswer(q, a) {
            document.querySelectorAll(`[data-q="${q}"]`).forEach(el => el.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function checkAnswers() {
            const correct = [0, 0];
            let score = 0;
            document.querySelectorAll('.answer-option.selected').forEach((el, i) => {
                const q = parseInt(el.dataset.q);
                const a = parseInt(el.dataset.a);
                if (a === correct[q]) { el.style.borderColor = 'var(--success)'; score++; }
                else el.style.borderColor = 'var(--danger)';
            });
            showToast(`Kết quả: ${score}/2`, score === 2 ? 'success' : 'info');
        }

        document.querySelector('.close').onclick = () => document.getElementById('readingModal').style.display = 'none';
        document.getElementById('searchBtn').onclick = loadReading;
        document.getElementById('levelFilter').onchange = loadReading;
        document.getElementById('categoryFilter').onchange = loadReading;
        loadReading();
    </script>
</body>
</html>
