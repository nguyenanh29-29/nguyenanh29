<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học ngữ pháp - EAnh</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🎓 EAnh</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="../dashboard.html" class="nav-item">
                    <span class="icon">📊</span> Dashboard
                </a>
                <a href="vocabulary.html" class="nav-item">
                    <span class="icon">📚</span> Từ vựng
                </a>
                <a href="grammar.html" class="nav-item active">
                    <span class="icon">✏️</span> Ngữ pháp
                </a>
                <a href="listening.html" class="nav-item">
                    <span class="icon">🎧</span> Luyện nghe
                </a>
                <a href="reading.html" class="nav-item">
                    <span class="icon">📖</span> Luyện đọc
                </a>
                <a href="writing.html" class="nav-item">
                    <span class="icon">✍️</span> Luyện viết
                </a>
                <a href="speaking.html" class="nav-item">
                    <span class="icon">🎤</span> Luyện nói
                </a>
                <a href="mock-test.html" class="nav-item">
                    <span class="icon">📝</span> Thi thử
                </a>
                <a href="result.html" class="nav-item">
                    <span class="icon">📈</span> Kết quả
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="profile.html" class="nav-item">
                    <span class="icon">👤</span> Hồ sơ
                </a>
                <a href="#" id="logoutBtn" class="nav-item">
                    <span class="icon">🚪</span> Đăng xuất
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>✏️ Học ngữ pháp</h1>
            </header>

            <div class="filter-section" style="margin-bottom: 2rem;">
                <select id="levelFilter" class="filter-select">
                    <option value="">Tất cả cấp độ</option>
                    <option value="A1">A1 - Cơ bản</option>
                    <option value="A2">A2 - Sơ cấp</option>
                    <option value="B1">B1 - Trung cấp</option>
                    <option value="B2">B2 - Trung cao</option>
                    <option value="C1">C1 - Nâng cao</option>
                    <option value="C2">C2 - Thành thạo</option>
                </select>
                
                <select id="categoryFilter" class="filter-select">
                    <option value="">Tất cả chủ đề</option>
                    <option value="Tenses">Thì</option>
                    <option value="Modals">Modal Verbs</option>
                    <option value="Conditionals">Câu điều kiện</option>
                    <option value="Passive">Câu bị động</option>
                    <option value="Reported Speech">Câu tường thuật</option>
                </select>

                <button id="searchBtn" class="btn-primary">Tìm kiếm</button>
            </div>

            <div class="stats-grid" style="margin-bottom: 2rem;">
                <div class="stat-card">
                    <div class="stat-icon">📖</div>
                    <div class="stat-info">
                        <h3 id="totalGrammar">0</h3>
                        <p>Tổng bài học</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <h3 id="completedGrammar">0</h3>
                        <p>Đã hoàn thành</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🎯</div>
                    <div class="stat-info">
                        <h3 id="progressPercent">0%</h3>
                        <p>Tiến độ</p>
                    </div>
                </div>
            </div>

            <div id="grammarList" class="grammar-grid"></div>
        </main>
    </div>

    <!-- Modal chi tiết bài học -->
    <div id="grammarModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 800px;">
            <span class="close">&times;</span>
            <div id="grammarDetail"></div>
        </div>
    </div>

    <!-- Modal quiz -->
    <div id="quizModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 700px;">
            <span class="close-quiz">&times;</span>
            <div id="quizContent"></div>
        </div>
    </div>

    <style>
        .filter-section {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 0.75rem 1rem;
            background: var(--dark-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            flex: 1;
            min-width: 150px;
        }

        .grammar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .grammar-card {
            background: linear-gradient(135deg, var(--dark-light), var(--dark-lighter));
            padding: 2rem;
            border-radius: 15px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .grammar-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .grammar-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .grammar-content {
            color: var(--text-muted);
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .grammar-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .grammar-level {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .grammar-detail-content {
            padding: 1rem 0;
        }

        .grammar-detail-content h3 {
            color: var(--primary);
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }

        .grammar-detail-content p {
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        .example-box {
            background: var(--dark);
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            margin: 1rem 0;
            font-style: italic;
        }

        .quiz-container {
            padding: 1rem 0;
        }

        .question-box {
            background: var(--dark);
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

        .question-text {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .answer-options {
            display: grid;
            gap: 0.75rem;
        }

        .answer-option {
            padding: 1rem;
            background: var(--dark-light);
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .answer-option:hover {
            border-color: var(--primary);
            background: var(--dark-lighter);
        }

        .answer-option.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.2);
        }

        .answer-option.correct {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.2);
        }

        .answer-option.wrong {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.2);
        }

        .quiz-result {
            background: var(--dark);
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
            margin-top: 2rem;
        }

        .quiz-score {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .quiz-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
    </style>

    <script src="../assets/js/main.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user.id) {
            window.location.href = '../login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('Bạn có chắc muốn đăng xuất?')) {
                localStorage.clear();
                window.location.href = '../login.html';
            }
        });

        let currentGrammarId = null;
        let quizQuestions = [];
        let currentQuestion = 0;
        let userAnswers = [];
        let score = 0;

        // Load grammar lessons
        async function loadGrammar() {
            try {
                const level = document.getElementById('levelFilter').value;
                const category = document.getElementById('categoryFilter').value;
                
                const url = `../backend/api/grammar.php?level=${level}&category=${category}&userId=${user.id}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success) {
                    displayGrammar(data.grammar);
                    updateStats(data.stats);
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Lỗi tải dữ liệu', 'error');
            }
        }

        function displayGrammar(grammar) {
            const container = document.getElementById('grammarList');
            if (grammar.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-muted); grid-column: 1/-1;">Không có bài học nào</p>';
                return;
            }

            container.innerHTML = grammar.map(item => `
                <div class="grammar-card" onclick="showGrammarDetail(${item.id})">
                    <div class="grammar-title">${item.title}</div>
                    <div class="grammar-content">${item.content.substring(0, 150)}...</div>
                    <div class="grammar-meta">
                        <span class="grammar-level">${item.level}</span>
                        <button class="btn-action" onclick="event.stopPropagation(); startQuiz(${item.id})">Làm bài tập</button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats(stats) {
            document.getElementById('totalGrammar').textContent = stats.total || 0;
            document.getElementById('completedGrammar').textContent = stats.completed || 0;
            const progress = stats.total > 0 ? Math.round((stats.completed / stats.total) * 100) : 0;
            document.getElementById('progressPercent').textContent = progress + '%';
        }

        async function showGrammarDetail(id) {
            try {
                const response = await fetch(`../backend/api/grammar.php?id=${id}`);
                const data = await response.json();
                
                if (data.success) {
                    const grammar = data.grammar;
                    currentGrammarId = id;
                    
                    const modal = document.getElementById('grammarModal');
                    const detail = document.getElementById('grammarDetail');
                    
                    detail.innerHTML = `
                        <h2 style="color: var(--primary); margin-bottom: 1rem; padding-right: 2rem;">${grammar.title}</h2>
                        <span class="grammar-level" style="margin-bottom: 1rem; display: inline-block;">${grammar.level}</span>
                        
                        <div class="grammar-detail-content">
                            <h3>📖 Lý thuyết</h3>
                            <p style="white-space: pre-line;">${grammar.content}</p>
                            
                            ${grammar.examples ? `
                                <h3>💡 Ví dụ</h3>
                                <div class="example-box">${grammar.examples.replace(/\n/g, '<br>')}</div>
                            ` : ''}
                        </div>
                        
                        <div style="display: flex; gap: 1rem; margin-top: 2rem; flex-wrap: wrap;">
                            <button onclick="markAsCompleted(${grammar.id})" class="btn-primary">Đánh dấu đã học</button>
                            <button onclick="startQuiz(${grammar.id})" class="btn-outline">Làm bài tập</button>
                        </div>
                    `;
                    
                    modal.classList.add('show');
                    modal.style.display = 'flex';
                    document.body.style.overflow = 'hidden';
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Lỗi tải dữ liệu', 'error');
            }
        }

        async function markAsCompleted(grammarId) {
            try {
                const formData = new FormData();
                formData.append('action', 'mark_completed');
                formData.append('userId', user.id);
                formData.append('grammarId', grammarId);
                
                const response = await fetch('../backend/api/grammar.php', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.success) {
                    showToast('Đã đánh dấu hoàn thành!', 'success');
                    loadGrammar();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function startQuiz(grammarId) {
            try {
                const response = await fetch(`../backend/api/grammar.php?action=getQuiz&grammarId=${grammarId}`);
                const data = await response.json();
                
                if (data.success && data.questions.length > 0) {
                    quizQuestions = data.questions;
                    currentQuestion = 0;
                    userAnswers = [];
                    score = 0;
                    
                    document.getElementById('grammarModal').style.display = 'none';
                    showQuizQuestion();
                } else {
                    showToast('Chưa có bài tập cho bài học này', 'info');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Lỗi tải bài tập', 'error');
            }
        }

        function showQuizQuestion() {
            const modal = document.getElementById('quizModal');
            const content = document.getElementById('quizContent');
            
            if (currentQuestion >= quizQuestions.length) {
                showQuizResult();
                return;
            }
            
            const q = quizQuestions[currentQuestion];
            
            content.innerHTML = `
                <h2 style="color: var(--primary); margin-bottom: 1rem; padding-right: 2rem;">Bài tập ngữ pháp</h2>
                <p style="color: var(--text-muted); margin-bottom: 2rem;">Câu ${currentQuestion + 1}/${quizQuestions.length}</p>
                
                <div class="question-box">
                    <div class="question-text">${q.question_text}</div>
                    <div class="answer-options">
                        ${q.option_a ? `<div class="answer-option" onclick="selectAnswer('A')">${q.option_a}</div>` : ''}
                        ${q.option_b ? `<div class="answer-option" onclick="selectAnswer('B')">${q.option_b}</div>` : ''}
                        ${q.option_c ? `<div class="answer-option" onclick="selectAnswer('C')">${q.option_c}</div>` : ''}
                        ${q.option_d ? `<div class="answer-option" onclick="selectAnswer('D')">${q.option_d}</div>` : ''}
                    </div>
                </div>
                
                <div style="display: flex; gap: 1rem; justify-content: space-between; margin-top: 2rem; flex-wrap: wrap;">
                    <button onclick="prevQuestion()" class="btn-outline" ${currentQuestion === 0 ? 'disabled' : ''}>← Trước</button>
                    <button onclick="nextQuestion()" class="btn-primary" id="nextBtn" disabled>Tiếp →</button>
                </div>
            `;
            
            modal.classList.add('show');
            modal.style.display = 'flex';
            document.getElementById('grammarModal').style.display = 'none';
            document.body.style.overflow = 'hidden';
        }

        function selectAnswer(answer) {
            document.querySelectorAll('.answer-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            event.target.classList.add('selected');
            
            userAnswers[currentQuestion] = answer;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentQuestion++;
            showQuizQuestion();
        }

        function prevQuestion() {
            currentQuestion--;
            showQuizQuestion();
        }

        function showQuizResult() {
            const content = document.getElementById('quizContent');
            
            score = 0;
            quizQuestions.forEach((q, index) => {
                if (userAnswers[index] === q.correct_answer) {
                    score++;
                }
            });
            
            const percentage = Math.round((score / quizQuestions.length) * 100);
            
            content.innerHTML = `
                <div class="quiz-result">
                    <h2 style="color: var(--primary); margin-bottom: 1rem;">Kết quả</h2>
                    <div class="quiz-score">${percentage}%</div>
                    <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">
                        Bạn đã trả lời đúng ${score}/${quizQuestions.length} câu
                    </p>
                    <p style="color: var(--text-muted);">
                        ${percentage >= 80 ? '🎉 Xuất sắc!' : percentage >= 60 ? '👍 Tốt!' : '💪 Cố gắng thêm!'}
                    </p>
                    
                    <div class="quiz-buttons">
                        <button onclick="closeQuiz()" class="btn-outline">Đóng</button>
                        <button onclick="retryQuiz()" class="btn-primary">Làm lại</button>
                    </div>
                </div>
            `;
            
            // Save result
            saveQuizResult(percentage);
        }

        async function saveQuizResult(percentage) {
            try {
                const formData = new FormData();
                formData.append('action', 'save_quiz_result');
                formData.append('userId', user.id);
                formData.append('grammarId', currentGrammarId);
                formData.append('score', percentage);
                
                await fetch('../backend/api/grammar.php', {
                    method: 'POST',
                    body: formData
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function retryQuiz() {
            currentQuestion = 0;
            userAnswers = [];
            score = 0;
            showQuizQuestion();
        }

        function closeQuiz() {
            const modal = document.getElementById('quizModal');
            modal.classList.remove('show');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
            loadGrammar();
        }

        // Close modals
        document.querySelector('.close').onclick = function() {
            const modal = document.getElementById('grammarModal');
            modal.classList.remove('show');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.querySelector('.close-quiz').onclick = function() {
            closeQuiz();
        }

        window.onclick = function(event) {
            const modal1 = document.getElementById('grammarModal');
            const modal2 = document.getElementById('quizModal');
            if (event.target == modal1) {
                modal1.classList.remove('show');
                modal1.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
            if (event.target == modal2) {
                closeQuiz();
            }
        }

        // Event listeners
        document.getElementById('searchBtn').addEventListener('click', loadGrammar);
        document.getElementById('levelFilter').addEventListener('change', loadGrammar);
        document.getElementById('categoryFilter').addEventListener('change', loadGrammar);

        // Load initial data
        loadGrammar();
    </script>
</body>
</html>
