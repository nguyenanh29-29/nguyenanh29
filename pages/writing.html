<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện viết - EAnh</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>🎓 EAnh</h2></div>
            <nav class="sidebar-nav">
                <a href="../dashboard.html" class="nav-item"><span class="icon">📊</span> Dashboard</a>
                <a href="vocabulary.html" class="nav-item"><span class="icon">📚</span> Từ vựng</a>
                <a href="grammar.html" class="nav-item"><span class="icon">✏️</span> Ngữ pháp</a>
                <a href="listening.html" class="nav-item"><span class="icon">🎧</span> Luyện nghe</a>
                <a href="reading.html" class="nav-item"><span class="icon">📖</span> Luyện đọc</a>
                <a href="writing.html" class="nav-item active"><span class="icon">✍️</span> Luyện viết</a>
                <a href="speaking.html" class="nav-item"><span class="icon">🎤</span> Luyện nói</a>
                <a href="mock-test.html" class="nav-item"><span class="icon">📝</span> Thi thử</a>
                <a href="result.html" class="nav-item"><span class="icon">📈</span> Kết quả</a>
            </nav>
            <div class="sidebar-footer">
                <a href="profile.html" class="nav-item"><span class="icon">👤</span> Hồ sơ</a>
                <a href="#" id="logoutBtn" class="nav-item"><span class="icon">🚪</span> Đăng xuất</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header"><h1>✍️ Luyện viết</h1></header>

            <div class="filter-section" style="margin-bottom: 2rem;">
                <select id="levelFilter" class="filter-select">
                    <option value="">Tất cả cấp độ</option>
                    <option value="A1">A1</option><option value="A2">A2</option>
                    <option value="B1">B1</option><option value="B2">B2</option>
                    <option value="C1">C1</option><option value="C2">C2</option>
                </select>
                <button id="searchBtn" class="btn-primary">Tìm kiếm</button>
            </div>

            <div id="writingList" class="writing-grid"></div>
        </main>
    </div>

    <div id="writingModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 1000px; max-height: 90vh; overflow-y: auto;">
            <span class="close">&times;</span>
            <div id="writingDetail"></div>
        </div>
    </div>

    <style>
        .writing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .writing-card { background: linear-gradient(135deg, var(--dark-light), var(--dark-lighter)); padding: 2rem; border-radius: 15px; border: 1px solid var(--border); cursor: pointer; transition: all 0.3s; }
        .writing-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
        .writing-title { font-size: 1.4rem; font-weight: bold; color: var(--primary); margin-bottom: 1rem; }
        .writing-topic { background: var(--dark); padding: 1.5rem; border-radius: 10px; border-left: 4px solid var(--primary); margin: 1.5rem 0; }
        .writing-textarea { width: 100%; min-height: 300px; padding: 1rem; background: var(--dark); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 1rem; line-height: 1.6; resize: vertical; }
        .word-count { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem; }
        .filter-select { padding: 0.75rem 1rem; background: var(--dark-light); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; flex: 1; min-width: 150px; }
        .filter-section { display: flex; gap: 1rem; flex-wrap: wrap; }
    </style>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/modal.js"></script>

    <script>
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user.id) window.location.href = '../login.html';
        
        document.getElementById('logoutBtn').onclick = (e) => {
            e.preventDefault();
            if (confirm('Đăng xuất?')) { localStorage.clear(); window.location.href = '../login.html'; }
        };

        async function loadWriting() {
            try {
                const level = document.getElementById('levelFilter').value;
                const res = await fetch(`../backend/api/writing.php?level=${level}`);
                const data = await res.json();
                if (data.success) displayWriting(data.writing);
            } catch (error) { showToast('Lỗi tải dữ liệu', 'error'); }
        }

        function displayWriting(writing) {
            const container = document.getElementById('writingList');
            if (writing.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Không có đề bài nào</p>';
                return;
            }
            container.innerHTML = writing.map(item => `
                <div class="writing-card" onclick="showWriting(${item.id})">
                    <div class="writing-title">${item.title}</div>
                    <p style="color: var(--text-muted);">${item.topic.substring(0, 100)}...</p>
                    <div style="margin-top: 1rem;">
                        <span class="vocab-level">${item.level}</span>
                    </div>
                </div>
            `).join('');
        }

        async function showWriting(id) {
            try {
                const res = await fetch(`../backend/api/writing.php?id=${id}`);
                const data = await res.json();
                if (data.success) {
                    const writing = data.writing;
                    document.getElementById('writingDetail').innerHTML = `
                        <h2 style="color: var(--primary); margin-bottom: 1rem;">${writing.title}</h2>
                        <span class="vocab-level">${writing.level}</span>
                        
                        <div class="writing-topic">
                            <h3 style="color: var(--primary); margin-bottom: 0.5rem;">📝 Đề bài</h3>
                            <p>${writing.topic}</p>
                        </div>
                        
                        ${writing.guidelines ? `
                            <div style="background: var(--dark); padding: 1.5rem; border-radius: 10px; margin-bottom: 1.5rem;">
                                <h3 style="color: var(--primary); margin-bottom: 0.5rem;">💡 Hướng dẫn</h3>
                                <p style="line-height: 1.8;">${writing.guidelines}</p>
                            </div>
                        ` : ''}
                        
                        <div style="margin-top: 2rem;">
                            <h3 style="color: var(--primary); margin-bottom: 1rem;">✍️ Bài viết của bạn</h3>
                            <textarea id="essayText" class="writing-textarea" placeholder="Viết bài của bạn tại đây..."></textarea>
                            <div class="word-count">Số từ: <span id="wordCount">0</span></div>
                            <button onclick="saveEssay(${writing.id})" class="btn-primary" style="margin-top: 1rem;">Lưu bài viết</button>
                        </div>
                        
                        ${writing.sample_essay ? `
                            <div style="background: var(--dark); padding: 1.5rem; border-radius: 10px; margin-top: 2rem;">
                                <h3 style="color: var(--primary); margin-bottom: 1rem;">📄 Bài mẫu</h3>
                                <p style="line-height: 1.8;">${writing.sample_essay}</p>
                            </div>
                        ` : ''}
                    `;
                    document.getElementById('readingModal').style.display = 'flex';
                    
                    document.getElementById('essayText').oninput = () => {
                        const text = document.getElementById('essayText').value.trim();
                        const words = text ? text.split(/\s+/).length : 0;
                        document.getElementById('wordCount').textContent = words;
                    };
                }
            } catch (error) { console.error(error); }
        }

        function saveEssay(writingId) {
            const essay = document.getElementById('essayText').value;
            if (!essay.trim()) {
                showToast('Vui lòng viết bài trước khi lưu!', 'warning');
                return;
            }
            showToast('Đã lưu bài viết!', 'success');
        }

        document.querySelector('.close').onclick = () => document.getElementById('writingModal').style.display = 'none';
        document.getElementById('searchBtn').onclick = loadWriting;
        document.getElementById('levelFilter').onchange = loadWriting;
        loadWriting();
    </script>
</body>
</html>
