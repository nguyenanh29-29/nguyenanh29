<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - EAnh</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, body { font-family: 'Outfit', sans-serif; }
        :root { --line: rgba(255,255,255,0.055); --amber: #f59e0b; --amber-glow: rgba(245,158,11,0.15); }
        body { background: #05080f; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* GRID */
        .grid-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 20%, transparent 100%);
        }

        /* AMBIENT GLOWS */
        .glow-amber {
            position: fixed; width: 700px; height: 700px; border-radius: 50%;
            background: radial-gradient(circle, rgba(245,158,11,0.07) 0%, transparent 65%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 0;
        }
        .glow-purple {
            position: fixed; width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(99,102,241,0.07) 0%, transparent 65%);
            bottom: -100px; right: -80px;
            pointer-events: none; z-index: 0;
        }

        /* CARD */
        .admin-card {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(245,158,11,0.2);
            border-radius: 22px; padding: 3rem;
            box-shadow: 0 30px 70px rgba(0,0,0,0.6), 0 0 50px rgba(245,158,11,0.06);
            animation: fadeUp 0.5s ease both;
            backdrop-filter: blur(10px);
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        /* Top badge */
        .admin-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25);
            color: var(--amber); padding: 0.4rem 1rem; border-radius: 50px;
            font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px;
            text-transform: uppercase; margin-bottom: 1.8rem;
        }
        .admin-badge-dot { width: 7px; height: 7px; background: var(--amber); border-radius: 50%; animation: blink 1.5s ease infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .admin-card h2 { font-size: 1.9rem; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 0.3rem; }
        .admin-card .sub { font-size: 1rem; color: var(--text-muted); margin-bottom: 1.8rem; }

        /* Warning */
        .warn-box {
            background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.18);
            border-radius: 10px; padding: 0.85rem 1rem;
            display: flex; align-items: flex-start; gap: 0.6rem; margin-bottom: 1.6rem;
        }
        .warn-box p { font-size: 0.92rem; color: #92400e; line-height: 1.5; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.95rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.45rem; }
        .form-group input {
            width: 100%; padding: 0.9rem 1.1rem; font-size: 1rem; font-family: 'Outfit', sans-serif;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
            border-radius: 10px; color: var(--text); outline: none; transition: all 0.25s;
        }
        .form-group input::placeholder { color: #2d3748; }
        .form-group input:focus {
            border-color: var(--amber); background: rgba(245,158,11,0.05);
            box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
        }

        /* Amber submit */
        .btn-admin {
            position: relative; overflow: hidden; width: 100%;
            background: linear-gradient(135deg, #d97706, #f59e0b);
            color: #050505; border: none; padding: 1rem; border-radius: 12px;
            font-size: 1.05rem; font-weight: 800; font-family: 'Outfit', sans-serif;
            cursor: pointer; letter-spacing: 0.2px; margin-top: 0.5rem;
            box-shadow: 0 0 25px rgba(245,158,11,0.3), 0 6px 20px rgba(0,0,0,0.4);
            transition: all 0.3s;
        }
        .btn-admin::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
            transform: translateX(-100%); transition: transform 0.6s ease;
        }
        .btn-admin:hover { box-shadow: 0 0 40px rgba(245,158,11,0.5), 0 10px 30px rgba(0,0,0,0.4); transform: translateY(-2px); }
        .btn-admin:hover::after { transform: translateX(100%); }
        .btn-admin:active { transform: translateY(0); }

        .form-footer { text-align: center; margin-top: 1.8rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.06); }
        .form-footer p { font-size: 0.95rem; color: var(--text-muted); margin: 0.35rem 0; }
        .form-footer a { color: #818cf8; text-decoration: none; font-weight: 600; }
        .form-footer a:hover { color: #c084fc; }
    </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow-amber"></div>
<div class="glow-purple"></div>

<div class="admin-card">
    <div class="admin-badge"><div class="admin-badge-dot"></div> Khu vực quản trị</div>
    <h2>Đăng nhập Admin</h2>
    <p class="sub">Chỉ dành cho quản trị viên hệ thống</p>

    <div class="warn-box">
        <span>⚠️</span>
        <p>Truy cập trái phép vào khu vực này là vi phạm và sẽ bị ghi lại đầy đủ.</p>
    </div>

    <div id="errorMessage" class="error-message" style="display:none;"></div>

    <form id="adminLoginForm">
        <div class="form-group">
            <label>Email quản trị</label>
            <input type="email" id="adminEmail" name="email" required placeholder="admin@eanh.com">
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="adminPassword" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-admin">Đăng nhập Admin →</button>
    </form>

    <div class="form-footer">
        <p><a href="login.html">← Đăng nhập thường</a></p>
        <p><a href="index.html">Quay về trang chủ</a></p>
    </div>
</div>

<script>
    document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('adminEmail').value;
        const password = document.getElementById('adminPassword').value;
        const errorDiv = document.getElementById('errorMessage');
        try {
            const fd = new FormData();
            fd.append('email', email); fd.append('password', password); fd.append('isAdmin', 'true');
            const res = await fetch('backend/auth/login.php', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.success && data.user.role === 'admin') {
                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminUser', JSON.stringify(data.user));
                window.location.href = 'admin-dashboard.html';
            } else {
                errorDiv.textContent = data.message || 'Không có quyền truy cập!';
                errorDiv.style.display = 'block';
            }
        } catch { errorDiv.textContent = 'Lỗi kết nối. Vui lòng thử lại!'; errorDiv.style.display = 'block'; }
    });
</script>
</body>
</html>
