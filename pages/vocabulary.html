<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học từ vựng - EAnh</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🎓 EAnh</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="../dashboard.html" class="nav-item">
                    <span class="icon">📊</span> Dashboard
                </a>
                <a href="vocabulary.html" class="nav-item active">
                    <span class="icon">📚</span> Từ vựng
                </a>
                <a href="grammar.html" class="nav-item">
                    <span class="icon">✏️</span> Ngữ pháp
                </a>
                <a href="listening.html" class="nav-item">
                    <span class="icon">🎧</span> Luyện nghe
                </a>
                <a href="reading.html" class="nav-item">
                    <span class="icon">📖</span> Luyện đọc
                </a>
                <a href="writing.html" class="nav-item">
                    <span class="icon">✍️</span> Luyện viết
                </a>
                <a href="speaking.html" class="nav-item">
                    <span class="icon">🎤</span> Luyện nói
                </a>
                <a href="mock-test.html" class="nav-item">
                    <span class="icon">📝</span> Thi thử
                </a>
                <a href="result.html" class="nav-item">
                    <span class="icon">📈</span> Kết quả
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="profile.html" class="nav-item">
                    <span class="icon">👤</span> Hồ sơ
                </a>
                <a href="#" id="logoutBtn" class="nav-item">
                    <span class="icon">🚪</span> Đăng xuất
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>📚 Học từ vựng</h1>
            </header>

            <div class="filter-section" style="margin-bottom: 2rem;">
                <select id="levelFilter" class="filter-select">
                    <option value="">Tất cả cấp độ</option>
                    <option value="A1">A1 - Cơ bản</option>
                    <option value="A2">A2 - Sơ cấp</option>
                    <option value="B1">B1 - Trung cấp</option>
                    <option value="B2">B2 - Trung cao</option>
                    <option value="C1">C1 - Nâng cao</option>
                    <option value="C2">C2 - Thành thạo</option>
                </select>
                
                <select id="categoryFilter" class="filter-select">
                    <option value="">Tất cả chủ đề</option>
                    <option value="Greetings">Chào hỏi</option>
                    <option value="Adjectives">Tính từ</option>
                    <option value="Verbs">Động từ</option>
                    <option value="Nouns">Danh từ</option>
                </select>

                <button id="searchBtn" class="btn-primary">Tìm kiếm</button>
            </div>

            <div class="stats-grid" style="margin-bottom: 2rem;">
                <div class="stat-card">
                    <div class="stat-icon">📖</div>
                    <div class="stat-info">
                        <h3 id="totalVocab">0</h3>
                        <p>Tổng từ vựng</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <h3 id="learnedVocab">0</h3>
                        <p>Đã học</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🎯</div>
                    <div class="stat-info">
                        <h3 id="masteredVocab">0</h3>
                        <p>Đã thuộc</p>
                    </div>
                </div>
            </div>

            <div id="vocabularyList" class="vocabulary-grid"></div>
        </main>
    </div>

    <!-- Modal hiển thị chi tiết từ -->
    <div id="vocabModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="vocabDetail"></div>
        </div>
    </div>

    <style>
        .filter-section {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 0.75rem 1rem;
            background: var(--dark-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            flex: 1;
            min-width: 150px;
        }

        .vocabulary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .vocab-card {
            background: linear-gradient(135deg, var(--dark-light), var(--dark-lighter));
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .vocab-word {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .vocab-pronunciation {
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 0.5rem;
        }

        .vocab-meaning {
            margin-bottom: 1rem;
        }

        .vocab-level {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .modal {
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--dark-light), var(--dark-lighter));
            padding: 2rem;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            border: 1px solid var(--border);
        }

        .close {
            position: absolute;
            right: 1.5rem;
            top: 1rem;
            font-size: 2rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .close:hover {
            color: var(--primary);
        }
    </style>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/modal.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user.id) {
            window.location.href = '../login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('Bạn có chắc muốn đăng xuất?')) {
                localStorage.clear();
                window.location.href = '../login.html';
            }
        });

        // Load vocabulary
        async function loadVocabulary() {
            try {
                const level = document.getElementById('levelFilter').value;
                const category = document.getElementById('categoryFilter').value;
                
                const url = `../backend/api/vocab.php?level=${level}&category=${category}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success) {
                    displayVocabulary(data.vocabulary);
                    updateStats(data.stats);
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Lỗi tải dữ liệu', 'error');
            }
        }

        function displayVocabulary(vocabulary) {
            const container = document.getElementById('vocabularyList');
            if (vocabulary.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-muted); grid-column: 1/-1;">Không có từ vựng nào</p>';
                return;
            }

            container.innerHTML = vocabulary.map(item => `
                <div class="vocab-card" onclick="showVocabDetail(${item.id})">
                    <div class="vocab-word">${item.word}</div>
                    <div class="vocab-pronunciation">${item.pronunciation || ''}</div>
                    <div class="vocab-meaning">${item.meaning}</div>
                    <span class="vocab-level">${item.level}</span>
                </div>
            `).join('');
        }

        function updateStats(stats) {
            document.getElementById('totalVocab').textContent = stats.total || 0;
            document.getElementById('learnedVocab').textContent = stats.learned || 0;
            document.getElementById('masteredVocab').textContent = stats.mastered || 0;
        }

        async function showVocabDetail(id) {
            try {
                const response = await fetch(`../backend/api/vocab.php?id=${id}`);
                const data = await response.json();
                
                if (data.success) {
                    const vocab = data.vocabulary;
                    const detail = document.getElementById('vocabDetail');
                    
                    detail.innerHTML = `
                        <h2 style="color: var(--primary); margin-bottom: 1rem; padding-right: 2rem;">${vocab.word}</h2>
                        <p style="color: var(--text-muted); font-style: italic; margin-bottom: 1rem;">${vocab.pronunciation || ''}</p>
                        <div style="margin-bottom: 1rem;">
                            <strong>Nghĩa:</strong> ${vocab.meaning}
                        </div>
                        ${vocab.example ? `<div style="margin-bottom: 1rem;">
                            <strong>Ví dụ:</strong> ${vocab.example}
                        </div>` : ''}
                        <div style="margin-bottom: 1rem;">
                            <span class="vocab-level">${vocab.level}</span>
                            ${vocab.category ? `<span class="vocab-level" style="background: var(--secondary); margin-left: 0.5rem;">${vocab.category}</span>` : ''}
                        </div>
                        <button onclick="markAsLearned(${vocab.id})" class="btn-primary">Đánh dấu đã học</button>
                    `;
                    
                    openModal('vocabModal');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Lỗi tải dữ liệu', 'error');
            }
        }

        async function markAsLearned(vocabId) {
            try {
                const formData = new FormData();
                formData.append('action', 'mark_learned');
                formData.append('userId', user.id);
                formData.append('vocabId', vocabId);
                
                const response = await fetch('../backend/api/vocab.php', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.success) {
                    showToast('Đã đánh dấu từ này!', 'success');
                    loadVocabulary();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Close modal - handled by modal.js
        // Remove old close handlers

        // Event listeners
        document.getElementById('searchBtn').addEventListener('click', loadVocabulary);
        document.getElementById('levelFilter').addEventListener('change', loadVocabulary);
        document.getElementById('categoryFilter').addEventListener('change', loadVocabulary);

        // Load initial data
        loadVocabulary();
    </script>
</body>
</html>
